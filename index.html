<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fread. — English → French Study Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== Settings Modal ===== -->
  <div id="settings-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="settings-close" class="icon-btn" aria-label="Close settings">&times;</button>
      </div>
      <label class="field-label" for="api-key-input">Gemini API Key</label>
      <input id="api-key-input" type="password" placeholder="Paste your Gemini API key" autocomplete="off" />
      <label class="field-label" for="model-select">Model</label>
      <select id="model-select">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash (recommended)</option>
        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
      </select>
      <label class="field-label" for="tts-speed-select">Speech Speed</label>
      <select id="tts-speed-select">
        <option value="0.5">0.5× (Slow)</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1× (Normal)</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5× (Fast)</option>
      </select>
      <button id="settings-save" class="btn btn-primary">Save</button>
    </div>
  </div>

  <!-- ===== Input Stage ===== -->
  <main id="input-stage">
    <header class="top-bar">
      <h1 class="logo">Fread<span class="logo-dot">.</span></h1>
      <button id="settings-btn" class="icon-btn" aria-label="Open settings">⚙</button>
    </header>
    <div class="input-container">
      <textarea id="text-input" placeholder="Paste your English text here…" rows="10"></textarea>
      <p id="word-count" class="hint"></p>
      <p id="api-key-hint" class="hint hint-warn hidden">Set your API key in Settings before translating.</p>
      <button id="free-btn" class="btn btn-primary btn-lg">Fread the Text</button>
      <button id="resume-btn" class="btn btn-ghost btn-lg hidden">Resume Last Study</button>
    </div>
  </main>

  <!-- ===== Study Stage ===== -->
  <main id="study-stage" class="hidden">
    <header class="top-bar">
      <button id="back-btn" class="icon-btn" aria-label="Back to input">←</button>
      <h1 class="logo">Fread<span class="logo-dot">.</span></h1>
      <button id="settings-btn-study" class="icon-btn" aria-label="Open settings">⚙</button>
    </header>
    <div id="card-list" class="card-list"></div>
  </main>

  <!-- ===== Card Template ===== -->
  <template id="card-template">
    <article class="card">
      <p class="card-en"></p>
      <div class="card-fr-row">
        <button class="play-btn icon-btn" aria-label="Play sentence">▶</button>
        <p class="card-fr"></p>
      </div>
      <details class="grammar-lab">
        <summary>Grammar Lab</summary>
        <div class="card-breakdown"></div>
      </details>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
